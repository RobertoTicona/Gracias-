<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gracias 💛</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #ffeaa7, #fab1a0);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 60px;
            color: #2d3436;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        .pollo {
            font-size: 100px;
            animation: bounce 1s infinite alternate;
        }

        p {
            font-size: 20px;
            color: #444;
            margin-top: 10px;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <h1>Gracias 💛</h1>

    <div class="pollo">🐔</div>

    <p>Un pollito feliz te da las gracias 🐣✨</p>

</body>
</html>
